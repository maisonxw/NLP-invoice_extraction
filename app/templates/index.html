<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Intelligence - Extract Data Effortlessly</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #f43f5e;
            --bg-glass: rgba(255, 255, 255, 0.75);
            --bg-dark-glass: rgba(17, 24, 39, 0.85);
            --text-main: #111827;
            --text-secondary: #6b7280;
            --shadow-soft: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Glassmorphism Navigation */
        nav {
            backdrop-filter: blur(12px);
            background: var(--bg-glass);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 1.5rem;
            flex: 1;
            width: 100%;
        }

        .glass-card {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--shadow-soft);
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
        }

        p.subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        /* Method Selector - Premium Toggle */
        .method-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .method-opt {
            padding: 1.2rem;
            border-radius: 16px;
            border: 2px solid transparent;
            background: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .method-opt:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .method-opt.active {
            border-color: var(--primary);
            background: #eff6ff;
            color: var(--primary);
        }

        .method-opt h3 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .method-opt span {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .method-opt.active span {
            color: var(--primary);
        }

        /* Modern Upload Zone */
        .upload-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(255, 255, 255, 0.4);
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.8);
        }

        .upload-zone.dragover {
            border-color: var(--primary);
            background: #eff6ff;
        }

        .upload-zone svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        #fileInput {
            display: none;
        }

        .btn-extract {
            width: 100%;
            padding: 1.25rem;
            border-radius: 16px;
            border: none;
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 2rem;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-extract:hover:not(:disabled) {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .btn-extract:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Results Display */
        .results-container {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-top: 2.5rem;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-item {
            background: white;
            padding: 1.25rem;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
        }

        .result-item.full {
            grid-column: span 2;
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 500;
            overflow-wrap: break-word;
        }

        .value.not-found {
            color: #94a3b8;
            font-style: italic;
        }

        /* Spinner & Loading */
        .loading {
            display: none;
            margin-top: 2rem;
            text-align: center;
            color: var(--primary);
            font-weight: 500;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .preview-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 1.5rem;
            display: none;
            box-shadow: var(--shadow-soft);
        }

        #errorBox {
            display: none;
            background: #fff1f2;
            color: #e11d48;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1.5rem;
            border: 1px solid #fecdd3;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">InvoiceIntelligence</div>
    </nav>

    <main>
        <div class="glass-card">
            <h2>Extraction Workshop</h2>
            <p class="subtitle">Choose your extraction technology and let our AI do the rest.</p>

            <div class="method-selector">
                <div class="method-opt active" onclick="setMethod('rule', this)">
                    <h3>Legacy Rules</h3>
                    <span>Deterministic & Fast</span>
                </div>
                <div class="method-opt" onclick="setMethod('llm', this)">
                    <h3>Neural LLM</h3>
                    <span>High Accuracy</span>
                </div>
                <div class="method-opt" onclick="setMethod('layoutlm', this)">
                    <h3>Spatial AI</h3>
                    <span>Fine-tuned LayoutLM</span>
                </div>
            </div>

            <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                    </path>
                </svg>
                <p>Drag file here or <span style="color:var(--primary); font-weight: 600;">click to browse</span></p>
                <input type="file" id="fileInput" accept="image/*">
                <img id="preview" class="preview-img" alt="Invoice Preview">
            </div>

            <button class="btn-extract" id="extractBtn" disabled onclick="processImage()">
                Extract Data
            </button>

            <div class="loading" id="loader">
                <div class="spinner"></div>
                Analyzing document...
            </div>

            <div id="errorBox"></div>

            <div class="results-container" id="results">
                <div class="result-item">
                    <div class="label">Merchant</div>
                    <div class="value" id="res-merchant"></div>
                </div>
                <div class="result-item">
                    <div class="label">Date</div>
                    <div class="value" id="res-date"></div>
                </div>
                <div class="result-item">
                    <div class="label">Total Amount</div>
                    <div class="value" id="res-total"></div>
                </div>
                <div class="result-item full">
                    <div class="label">Address</div>
                    <div class="value" id="res-address"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentMethod = 'rule';
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const extractBtn = document.getElementById('extractBtn');
        const dropZone = document.getElementById('dropZone');

        function setMethod(method, el) {
            currentMethod = method;
            document.querySelectorAll('.method-opt').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        fileInput.addEventListener('change', function (e) {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function (ex) {
                    preview.src = ex.target.result;
                    preview.style.display = 'block';
                    extractBtn.disabled = false;
                }
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            fileInput.dispatchEvent(new Event('change'));
        });

        async function processImage() {
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const loader = document.getElementById('loader');
            const results = document.getElementById('results');
            const errorBox = document.getElementById('errorBox');

            loader.style.display = 'block';
            results.style.display = 'none';
            errorBox.style.display = 'none';
            extractBtn.disabled = true;

            try {
                const response = await fetch(`/api/predict/${currentMethod}`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error);

                document.getElementById('res-merchant').innerText = data.company || 'Not Found';
                document.getElementById('res-date').innerText = data.date || 'Not Found';
                document.getElementById('res-total').innerText = data.total || 'Not Found';
                document.getElementById('res-address').innerText = data.address || 'Not Found';

                results.style.display = 'grid';
            } catch (err) {
                errorBox.innerText = 'Extraction Error: ' + err.message;
                errorBox.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                extractBtn.disabled = false;
            }
        }
    </script>
</body>

</html>
